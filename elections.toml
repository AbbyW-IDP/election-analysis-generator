# elections.toml
# --------------
# Define each election here before loading its CSV.
# source_file must match the CSV filename in the sources/ directory exactly.
# year is optional if the filename starts with a 4-digit year.
# election_date and results_last_updated use ISO 8601 format (YYYY-MM-DD).

[elections.2014-general-primary]
name                 = "2014 General Primary"
year                 = 2014
election_date        = "2014-03-18"
results_last_updated = "2014-04-07"
category             = "General Primary"
election_type        = "midterm"
source_file          = "2014-general-primary-2018-03-18.csv"
registered_voters    = 576797
ballots_cast         = 110696

