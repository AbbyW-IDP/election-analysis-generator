name: MegaLinter

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APPLY_FIXES: all
  APPLY_FIXES_EVENT: push
  APPLY_FIXES_MODE: commit

jobs:
  megalinter:
    name: Run MegaLinter
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/python@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_LINTERS: >-
            PYTHON_RUFF,
            PYTHON_RUFF_FORMAT,
            PYTHON_MYPY,
            PYTHON_BANDIT,
            REPOSITORY_TRIVY,
            YAML_YAMLLINT,
            MARKDOWN_MARKDOWNLINT
