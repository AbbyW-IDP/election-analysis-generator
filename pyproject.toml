[project]
name = "dupage-elections"
version = "0.1.0"
description = "Analysis of partisan primary election results in DuPage County, IL"
requires-python = ">=3.14"
dependencies = [
    "pandas>=3.0",
    "openpyxl>=3.1",
]

[project.scripts]
sync-sources      = "dupage_elections.cli:sync_sources"
generate-analysis = "dupage_elections.cli:generate_analysis"
export-flags      = "dupage_elections.cli:export_flags_cmd"
import-flags      = "dupage_elections.cli:import_flags_cmd"
review-flags      = "dupage_elections.cli:review_flags_cmd"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--cov=dupage_elections",
    "--cov-report=term-missing",
]

[tool.coverage.run]
source = ["dupage_elections"]
omit = ["tests/*"]
