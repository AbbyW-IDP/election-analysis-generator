[project]
name = "dupage-elections"
version = "0.1.0"
description = "Analysis of partisan primary election results in DuPage County, IL"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "openpyxl>=3.1",
]

[project.scripts]
setup-db          = "dupage_elections:setup_db.main"
load-election     = "dupage_elections:load_election.main"
generate-analysis = "dupage_elections:generate_analysis.main"
review-flags      = "dupage_elections:review_flags.main"

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-xdist>=3.0",
]

[tool.pytest.ini_options]
testpaths    = ["tests"]
addopts      = "-ra -q"

[tool.coverage.run]
source = ["dupage_elections"]
omit   = ["tests/*"]

[tool.coverage.report]
show_missing = true
